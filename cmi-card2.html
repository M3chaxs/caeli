<style>
/****** INcrustado hoja de estilos *******/


.bungee-regular {
  font-family: "Bungee", sans-serif;
  font-weight: 400;
  font-style: normal;
}
  
  
  /* Watch this video https://youtu.be/_-IgBj04fog */
*{
    margin: 0;
    padding: 0;
}

body{
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card{
    display: flex;
    flex-direction: column;
    align-items: center;
}

.img-container{
    margin-bottom: -50px;
    border-radius: 20px;
    overflow: hidden;
}

.skewed{
    width: 250px;
    height: 320px;
    margin: 50px 0 -50px 0;
    border-radius: 30px;
    transform: skewY(15deg);
    overflow: hidden;
}

#img{
    width: 100%;
    height: 100%;
    margin-top: -30px;
    transform: skewY(-15deg);
    background-image: url("https://images.unsplash.com/photo-1613483812364-896455b2b309?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=634&q=80");
    background-size: 100%;
    background-position: center;
    transition: all 0.3s ease;
}

#img:hover{
    background-size: 110%;
}

.content{
    width: 400px;
    height: 130px;
    padding-top: 50px;
    border-radius: 5px;
    box-shadow:rgba(17, 17, 26, 0.1) 0px 8px 24px, rgba(17, 17, 26, 0.1) 0px 16px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.content h3{
    font-size: 25px;
    color: #353535;
}

.content p{
    font-size: 16px;
    margin-top: 1px;
    color: #353535;
}

.content .links{
    width: 80%;
    margin-top: 10px;
    display: flex;
    justify-content: space-evenly;
}

.content .links i{
    color: #b95808;
    font-size: 30px;
    border-radius: 20px;
    transition: all 0.3s ease;
}

.content .links i:hover{
    transform: scale(1.2);
}
  
  

.slide {

  /* se puede poner fondo de la pantalla */ 
  /* recursos: https://pixabay.com/es/images/search/abstracto/ */
  background-image: url('https://cdn.pixabay.com/photo/2021/08/18/19/26/background-6556414_1280.jpg');
    background-size:cover;
}


</style>
</head>

<!---------------- CONTENIDO ------------------------------>
<!--------------------------------------------------------->
  
  
  
<body class="slide">

    

<!------------------ PROFILE CARD ------------------------>
<!-- Watch this video https://youtu.be/_-IgBj04fog  -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">

    <div class="card">
        <div class="img-container">
            <div class="skewed">
                <div id="img"></div>
            </div>
        </div>
        <div class="content">
            <h2 class="bungee-regular">María Lopez</h2>
            <p >Web developer</p>
            <div class="links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/mgea/interart"><i class="fab fa-github"></i></a>
                <a href="https://https://cmiugr.itch.io/"><i class="fab fa-itch-io"></i></a>
            </div>
        </div>
    </div>
